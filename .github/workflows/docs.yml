# Builds the DocC site on push to main and deploys it to GitHub Pages.
#
# One-time setup (done out-of-band, Pages must be enabled before the first deploy):
#   gh api -X POST repos/mnmly/mlx-swift-rf-detr/pages -f build_type=workflow

name: Build and deploy DocC

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    env:
      TARGETS: MLXRFDETR
      HOSTING_BASE_PATH: mlx-swift-rf-detr
      REPO_URL: https://github.com/mnmly/mlx-swift-rf-detr
    steps:
      - uses: actions/checkout@v4

      # mlx-swift-lm uses swift-tools-version 6.1, so select a Swift 6.1+ toolchain.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build docs
        run: ./Scripts/build_docs.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
